# docker-compose.yml
# Run: docker-compose up -d

services:

  # ── Next.js App ──────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_TMDB_IMAGE: "https://image.tmdb.org/t/p"
        NEXT_PUBLIC_APP_URL: "http://localhost:3000"
    container_name: moviefinder-app
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    environment:
      - NODE_ENV=production
      - ADMIN_PANEL_URL=http://localhost:3001
    depends_on:
      - mongo
    restart: unless-stopped
    networks:
      - moviefinder-net

  # ── Rushes Admin Panel ───────────────────────────────────────────
  admin:
    build:
      context: C:/rushes-admin
      dockerfile: C:/movie-finder-v2/Dockerfile.admin
    container_name: rushes-admin
    ports:
      - "3001:3001"
    env_file:
      - C:/rushes-admin/.env.local
    environment:
      - NODE_ENV=production
      - PORT=3001
    depends_on:
      - mongo
    restart: unless-stopped
    networks:
      - moviefinder-net

  # ── MongoDB (local dev only — use Atlas in production) ───────────
  mongo:
    image: mongo:7
    container_name: moviefinder-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=moviefinder
    restart: unless-stopped
    networks:
      - moviefinder-net

  # ── Nginx reverse proxy (production) ────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: moviefinder-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - moviefinder-net

volumes:
  mongo-data:

networks:
  moviefinder-net:
    driver: bridge
